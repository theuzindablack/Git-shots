<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages | Explorador</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <!-- Área do usuário no canto superior direito -->
    <div class="user-header">
        <div id="loginArea">
            <button class="gh-btn" id="loginBtn">Entrar com GitHub</button>
        </div>
        <div id="userArea" style="display: none;">
            <img id="userAvatar" alt="Foto do usuário" class="avatar">
            <div class="user-info">
                <span id="userName"></span>
                <button class="gh-btn sair-btn" id="logoutBtn">Sair</button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="search-container">
            <label class="search-label">Buscar Projetos</label>
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Nome, usuário ou assunto...">
                <button class="gh-btn" id="buscarBtn">Buscar</button>
            </div>
            <p class="info-text" id="limiteInfo">Sem login: 60 req/hora | Logado: 5000 req/hora</p>
        </div>
        <div class="repo-list" id="listaRepos">
            <div class="no-selection">
                <svg height="32" viewBox="0 0 16 16" width="32" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                <p>Busque projetos com GitHub Pages ativos</p>
            </div>
        </div>
    </aside>

    <main class="preview-area" id="areaPreview">
        <div class="no-selection">
            <p>Selecione um repositório para visualizar</p>
        </div>
    </main>

    <!-- Importa como módulo para funcionar a separação dos arquivos -->
    <script type="module" src="js/principal.js"></script>
</body>
</html>
